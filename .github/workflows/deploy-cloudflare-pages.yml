name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
      - preview
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select deploy environment
        id: deploy-env
        env:
          SUPABASE_DB_URL_NONPROD: ${{ secrets.SUPABASE_DB_URL_NONPROD }}
          SUPABASE_DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}
          VITE_SUPABASE_URL_NONPROD: ${{ secrets.VITE_SUPABASE_URL_NONPROD }}
          VITE_SUPABASE_ANON_KEY_NONPROD: ${{ secrets.VITE_SUPABASE_ANON_KEY_NONPROD }}
          VITE_SUPABASE_URL_PROD: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          VITE_SUPABASE_ANON_KEY_PROD: ${{ secrets.VITE_SUPABASE_ANON_KEY_PROD }}
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "db_url=${SUPABASE_DB_URL_PROD}" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_url=${VITE_SUPABASE_URL_PROD}" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_anon_key=${VITE_SUPABASE_ANON_KEY_PROD}" >> "$GITHUB_OUTPUT"
          else
            echo "db_url=${SUPABASE_DB_URL_NONPROD}" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_url=${VITE_SUPABASE_URL_NONPROD}" >> "$GITHUB_OUTPUT"
            echo "vite_supabase_anon_key=${VITE_SUPABASE_ANON_KEY_NONPROD}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Supabase migrations
        if: steps.deploy-env.outputs.db_url != ''
        env:
          SUPABASE_DB_URL: ${{ steps.deploy-env.outputs.db_url }}
        run: npx supabase@latest db push --db-url "$SUPABASE_DB_URL" --include-all

      - name: Build app
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_SUPABASE_URL: ${{ steps.deploy-env.outputs.vite_supabase_url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.deploy-env.outputs.vite_supabase_anon_key }}
        run: |
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 3.90.0
          command: pages deploy dist --project-name trivia-games --branch ${{ github.ref_name }} --commit-dirty=true

      - name: Purge cache-sensitive URLs
        if: github.ref_name == 'main' && env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"files":["https://triviagames.cristache.net/","https://triviagames.cristache.net/sw.js","https://triviagames.cristache.net/manifest.webmanifest"]}'
