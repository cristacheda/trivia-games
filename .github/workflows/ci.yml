name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - preview

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check docs sync on pull requests
        if: github.event_name == 'pull_request'
        run: npm run docs:check:ci -- --against "origin/${{ github.base_ref }}...HEAD"

      - name: Check docs sync on pushes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npm run docs:check:ci -- --against "${{ github.event.before }}...${{ github.sha }}"

      - name: Lint
        run: npm run lint

      - name: Unit tests
        if: github.event_name == 'pull_request'
        run: npm run test:unit

      - name: Changed test selection
        if: github.event_name == 'pull_request'
        run: npm run test:changed

      - name: Browser smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:e2e:smoke

      - name: Fast build validation
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Full validation
        if: github.event_name == 'push'
        run: npm run check

      - name: Full browser suite
        if: github.event_name == 'push'
        run: npm run test:e2e:full

      - name: Offline browser suite
        if: github.event_name == 'push'
        run: npm run test:e2e:offline
