<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Atlas of Answers social preview card</title>
  <desc id="desc">Editorial green social card with Atlas of Answers branding and floating trivia category tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f7fcf7"/>
      <stop offset="56%" stop-color="#edf6ee"/>
      <stop offset="100%" stop-color="#d4ecdc"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0%" cy="0%" r="58%">
      <stop offset="0%" stop-color="rgba(69,154,103,0.18)"/>
      <stop offset="100%" stop-color="rgba(69,154,103,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="0%" r="52%">
      <stop offset="0%" stop-color="rgba(191,219,198,0.48)"/>
      <stop offset="100%" stop-color="rgba(191,219,198,0)"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(132,193,152,0.16)"/>
      <stop offset="100%" stop-color="rgba(132,193,152,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>
